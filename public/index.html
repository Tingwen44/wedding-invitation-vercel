<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管廷文 & 王昕 婚礼邀请函</title>
    <!-- Open Graph Meta Tags for WeChat Card Preview -->
    <meta property="og:title" content="管廷文 & 王昕 | 婚礼邀请">
    <meta property="og:description" content="诚挚邀请您参加我们的婚礼">
    <meta property="og:image" content="https://files.manuscdn.com/user_upload_by_module/session_file/310519663407980077/eypTFABWuOWrhsuo.jpg">
    <meta property="og:url" content="https://tingwen44.github.io/Wedding/">
    <meta property="og:type" content="website">
    <!-- WeChat Specific -->
    <meta name="description" content="诚挚邀请您参加我们的婚礼">
    <meta name="theme-color" content="#F8F5F2">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Serif SC', serif; 
            background-color: #F8F5F2; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }
        .main-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-img {
            width: 100%;
            display: block;
        }
        .form-section { 
            width: 100%;
            max-width: 600px;
            padding: 40px 24px 100px 24px;
            box-sizing: border-box;
            background-color: #F8F5F2; 
        }
        .form-title { 
            color: #8B0000; 
            font-size: 1.6rem; 
            font-weight: 600; 
            letter-spacing: 0.3em; 
            margin-bottom: 2.5rem; 
            text-align: center;
        }
        .form-item { margin-bottom: 2rem; text-align: left; }
        .form-label { 
            display: block; 
            font-size: 0.95rem; 
            margin-bottom: 0.8rem; 
            color: #444; 
            border-left: 3px solid #8B0000; 
            padding-left: 10px; 
            font-weight: 500;
        }
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-bottom: 1px solid #ccc; 
            background: rgba(255, 255, 255, 0.4); 
            outline: none; 
            font-size: 1rem;
        }
        .option-group { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { 
            padding: 12px; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            background: white; 
            font-size: 0.9rem; 
            text-align: center; 
            transition: all 0.3s;
            cursor: pointer;
        }
        input[type="radio"]:checked + .option-btn, 
        input[type="checkbox"]:checked + .option-btn { 
            background-color: #8B0000; 
            color: white; 
            border-color: #8B0000; 
        }
        .submit-btn { 
            background-color: #8B0000; 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border-radius: 50px; 
            margin-top: 3rem; 
            font-size: 1.1rem; 
            letter-spacing: 0.6em; 
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .footer-text {
            font-size: 11px;
            color: #999;
            margin-top: 50px;
            text-align: center;
            line-height: 1.8;
        }
        .success-message {
            color: #28a745;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            color: #8B0000;
            margin-top: 10px;
        }
        .music-control-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
            padding: 0;
        }
        .music-control-btn img {
            width: 40px;
            height: 40px;
            display: block;
        }
        .music-control-btn:hover {
            transform: scale(1.15);
        }
        .music-control-btn:active {
            transform: scale(0.9);
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 音乐播放器 -->
    <audio id="bgMusic" loop>
        <source src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663407980077/lRiMoZkLiPCimPiu.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 音乐控制按钮 -->
    <button class="music-control-btn" id="musicBtn" title="点击开启/关闭音乐">
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663407980077/mGhTNPAGknvoHCWo.gif" alt="音乐控制">
    </button>
    
    <div class="main-wrapper">
        <img src="https://pic1.imgdb.cn/item/69b6830886fff564438fa2fc.png" class="header-img" alt="Wedding Invitation">

        <form id="inviteForm" class="form-section">
            <h2 class="form-title">邀请函确认</h2>
            
            <div class="form-item">
                <span class="form-label">1. 选择参与的婚礼 (单选)</span>
                <div class="option-group">
                    <label><input type="radio" name="wedding_location" value="山西晋城 - 凤城国际康养中心 (05.01)" class="hidden" required><div class="option-btn">山西晋城 - 凤城国际康养中心 (05.01)</div></label>
                    <label><input type="radio" name="wedding_location" value="山东诸城 - 蓝海大酒店 (05.04)" class="hidden"><div class="option-btn">山东诸城 - 蓝海大酒店 (05.04)</div></label>
                    <label><input type="radio" name="wedding_location" value="我都参加" class="hidden"><div class="option-btn">我都参加</div></label>
                </div>
            </div>

            <div class="form-item">
                <span class="form-label">2. 宾客信息</span>
                <input type="text" name="guest_name" placeholder="您的姓名:" required class="mb-4">
                <input type="number" name="guest_count" placeholder="参与人数:" min="1">
                <input type="text" name="accompanying_guests" placeholder="参与亲友姓名:" class="mt-4">
            </div>

            <div class="form-item">
                <span class="form-label">3. 住宿要求 (多选)</span>
                <div class="option-group">
                    <label><input type="checkbox" name="accommodation_dates" value="4月30日 (晋城)" class="hidden"><div class="option-btn">4月30日 (晋城)</div></label>
                    <label><input type="checkbox" name="accommodation_dates" value="5月1日 (晋城)" class="hidden"><div class="option-btn">5月1日 (晋城)</div></label>
                    <label><input type="checkbox" name="accommodation_dates" value="5月3日 (诸城)" class="hidden"><div class="option-btn">5月3日 (诸城)</div></label>
                    <label><input type="checkbox" name="accommodation_dates" value="5月4日 (诸城)" class="hidden"><div class="option-btn">5月4日 (诸城)</div></label>
                    <label><input type="checkbox" name="accommodation_dates" value="不需提供住宿" class="hidden"><div class="option-btn">不需提供住宿</div></label>
                </div>
            </div>

            <div class="form-item">
                <span class="form-label">4. 房型要求 (单选)</span>
                <div class="option-group">
                    <label><input type="radio" name="room_type" value="大床房" class="hidden"><div class="option-btn">大床房</div></label>
                    <label><input type="radio" name="room_type" value="双床房" class="hidden"><div class="option-btn">双床房</div></label>
                    <label><input type="radio" name="room_type" value="不住宿" class="hidden"><div class="option-btn">不住宿</div></label>
                </div>
            </div>

            <button type="submit" class="submit-btn active:scale-95 transition-transform">提交确认回执</button>
            
            <div class="loading" id="loadingMessage">
                正在提交中...
            </div>
            
            <div class="success-message" id="successMessage">
                ✓ 感谢您的回复！我们已收到您的邀请函确认。
            </div>
            
            <div class="error-message" id="errorMessage">
                ✗ 提交失败，请检查网络连接后重试。
            </div>
            
            <div class="footer-text">
                最后, 请添加我们的助理微信, 会与您沟通后续信息:<br>
                <span class="font-bold text-gray-700">kejikitty</span>
            </div>
        </form>
    </div>

    <script>
        // ============================================
        // 配置后端 URL
        // ============================================
        const BACKEND_URL = 'https://wedding-backend-production-6728.up.railway.app';
        
        // ============================================
        // 表单提交处理
        // ============================================
        document.getElementById('inviteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('.submit-btn');
            const loadingMessage = document.getElementById('loadingMessage');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            loadingMessage.style.display = 'block';
            
            submitBtn.disabled = true;
            
            try {
                const formData = new FormData(this);
                const accommodationDates = formData.getAll('accommodation_dates');
                
                const data = {
                    wedding_location: formData.get('wedding_location'),
                    guest_name: formData.get('guest_name'),
                    guest_count: parseInt(formData.get('guest_count')) || 0,
                    accompanying_guests: formData.get('accompanying_guests') || '',
                    accommodation_dates: accommodationDates.join(', '),
                    room_type: formData.get('room_type') || '',
                    special_requirements: formData.get('special_requirements') || '',
                    timestamp: new Date().toISOString()
                };
                
                const response = await fetch(`${BACKEND_URL}/api/rsvp/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    loadingMessage.style.display = 'none';
                    successMessage.style.display = 'block';
                    this.reset();
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                console.error('Error:', error);
                loadingMessage.style.display = 'none';
                errorMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        // ============================================
        // 音乐控制逻辑 - 支持移动浏览器
        // ============================================
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;
        let autoplayAttempted = false;
        
        // 尝试自动播放音乐
        function attemptAutoplay() {
            if (!autoplayAttempted && bgMusic) {
                autoplayAttempted = true;
                console.log('[音乐] 尝试自动播放...');
                
                bgMusic.play().then(() => {
                    console.log('[音乐] 自动播放成功！');
                    musicBtn.classList.add('playing');
                    isPlaying = true;
                }).catch(err => {
                    console.log('[音乐] 自动播放失败（这是正常的，需要用户交互）:', err.name);
                });
            }
        }
        
        // 在用户首次交互时触发自动播放
        function onFirstInteraction() {
            console.log('[音乐] 检测到用户交互，尝试播放...');
            attemptAutoplay();
            
            // 移除所有交互监听器（只执行一次）
            document.removeEventListener('click', onFirstInteraction);
            document.removeEventListener('touchstart', onFirstInteraction);
            document.removeEventListener('keydown', onFirstInteraction);
        }
        
        // 监听用户交互事件（只执行一次）
        document.addEventListener('click', onFirstInteraction, { once: true });
        document.addEventListener('touchstart', onFirstInteraction, { once: true });
        document.addEventListener('keydown', onFirstInteraction, { once: true });
        
        // 页面加载完成后也尝试自动播放
        window.addEventListener('load', function() {
            console.log('[音乐] 页面加载完成，等待 500ms 后尝试播放...');
            setTimeout(() => {
                attemptAutoplay();
            }, 500);
        });
        
        // 音乐控制按钮点击事件
        musicBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // 防止触发自动播放逻辑
            
            if (isPlaying) {
                console.log('[音乐] 用户点击暂停');
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                console.log('[音乐] 用户点击播放');
                bgMusic.play().catch(err => {
                    console.log('[音乐] 播放失败:', err);
                });
                musicBtn.classList.add('playing');
                isPlaying = true;
            }
        });
        
        // 监听音乐播放结束事件（循环播放）
        bgMusic.addEventListener('ended', function() {
            console.log('[音乐] 播放结束，重新开始');
            bgMusic.currentTime = 0;
            bgMusic.play();
        });
        
        // 监听音乐播放/暂停事件，实时更新按钮状态
        bgMusic.addEventListener('play', function() {
            console.log('[音乐] 播放事件');
            musicBtn.classList.add('playing');
            isPlaying = true;
        });
        
        bgMusic.addEventListener('pause', function() {
            console.log('[音乐] 暂停事件');
            musicBtn.classList.remove('playing');
            isPlaying = false;
        });
        
        console.log('[初始化] 表单已加载，后端 URL:', BACKEND_URL);
        console.log('[初始化] 音乐播放系统已初始化');
    </script>
</body>
</html>
